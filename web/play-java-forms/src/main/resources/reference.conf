play {
  modules {
    enabled += "play.data.FormFactoryModule"
    enabled += "play.data.format.FormattersModule"
    enabled += "play.data.validation.ValidatorsModule"
  }

  forms {

    binding {

      # Enables or disables direct field access during form binding.
      # If disabled (the default) getter methods will be used to access the form during binding.
      directFieldAccess = false

      # Limits how far Play will auto-grow arrays and collections while binding indexed form fields.
      # For example, the default value 256 allows binding index 255, but rejects index 256.
      # This prevents accidental or malicious submissions with very large indexes from allocating
      # excessive memory.
      autoGrowCollectionLimit = 256

      # Limits the total amount of auto-growing Play will perform while binding a single Java form.
      # This complements autoGrowCollectionLimit: autoGrowCollectionLimit caps each individual
      # indexed collection path, while maxAutoGrowOperations caps cumulative nested growth across
      # the submitted form data.
      maxAutoGrowOperations = 1024
    }

  }

}
